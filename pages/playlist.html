<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="قائمة التشغيل — بطوط ميوزك">
<title>قائمة التشغيل — بطوط ميوزك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<link rel="stylesheet" href="../css/app.css">
<style>
  .playlist-hero {
    background: linear-gradient(135deg, var(--primary-container), var(--secondary-container));
    padding: 48px 32px 36px; color: white; position: relative; overflow: hidden;
  }
  .playlist-hero::before {
    content: ''; position: absolute; inset: 0;
    background: url('') center/cover no-repeat;
    opacity: 0.15; filter: blur(30px);
  }
  .playlist-hero-content {
    position: relative; z-index: 1;
    display: flex; align-items: flex-end; gap: 28px;
  }
  .playlist-cover {
    width: 180px; height: 180px; border-radius: 16px; flex-shrink: 0;
    background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
    overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
  }
  .playlist-cover-grid { display: grid; grid-template-columns: 1fr 1fr; width: 100%; height: 100%; }
  .playlist-cover-grid img { width: 100%; height: 100%; object-fit: cover; }

  .playlist-meta { flex: 1; }
  .playlist-type { font-size: 12px; font-weight: 700; letter-spacing: 0.08em; opacity: 0.85; margin-bottom: 8px; }
  .playlist-name { font-size: clamp(28px, 5vw, 52px); font-weight: 800; line-height: 1.1; margin-bottom: 12px; }
  .playlist-info { font-size: 14px; opacity: 0.8; }

  .playlist-actions {
    display: flex; align-items: center; gap: 12px; padding: 24px 32px;
    border-bottom: 1px solid var(--outline-variant);
  }
  .play-all-btn {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary-container), var(--secondary-container));
    color: white; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 20px rgba(79,70,229,0.4); transition: all 0.3s ease;
  }
  .play-all-btn:hover { transform: scale(1.08); box-shadow: 0 8px 28px rgba(79,70,229,0.5); }

  .add-music-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 32px; border-bottom: 1px solid var(--outline-variant);
    background: rgba(255,255,255,0.4);
  }
  .add-music-bar input {
    flex: 1; padding: 10px 16px; border-radius: 50px;
    background: rgba(255,255,255,0.6); border: 1px solid var(--outline-variant);
    font-size: 14px; outline: none; transition: all 0.3s;
    color: var(--on-surface);
  }
  .add-music-bar input:focus { border-color: var(--primary-container); background: white; }

  .empty-playlist {
    text-align: center; padding: 80px 20px;
  }
  .empty-playlist .material-symbols-outlined {
    font-size: 80px; display: block; margin-bottom: 20px;
    opacity: 0.25; color: var(--primary-container);
  }

  @media(max-width:600px) {
    .playlist-hero { padding: 32px 16px 24px; }
    .playlist-hero-content { flex-direction: column; align-items: flex-start; }
    .playlist-cover { width: 130px; height: 130px; }
    .playlist-actions, .add-music-bar { padding: 16px; }
  }
</style>
</head>
<body class="liquid-bg">
<div class="ambient-blobs"></div>

<div class="app-shell">
  <div id="sidebar-slot"></div>

  <div class="main-content">
    <!-- Topbar -->
    <div class="topbar">
      <button class="topbar-nav-btn" onclick="history.back()">
        <span class="material-symbols-outlined" style="font-size:20px">arrow_back</span>
      </button>
      <span class="text-headline-sm" style="font-weight:700" id="topbar-title">قائمة التشغيل</span>
      <div class="topbar-actions">
        <button class="btn-icon" id="edit-btn" onclick="startEdit()" title="تعديل">
          <span class="material-symbols-outlined" style="font-size:20px">edit</span>
        </button>
        <button class="btn-icon" id="delete-btn" onclick="deletePlaylist()" title="حذف" style="color:var(--error)">
          <span class="material-symbols-outlined" style="font-size:20px">delete</span>
        </button>
      </div>
    </div>

    <!-- Playlist Hero -->
    <div class="playlist-hero" id="playlist-hero">
      <div class="playlist-hero-content">
        <div class="playlist-cover" id="playlist-cover">
          <span class="material-symbols-outlined" style="font-size:64px;opacity:0.6;font-variation-settings:'FILL' 1">queue_music</span>
        </div>
        <div class="playlist-meta">
          <div class="playlist-type">قائمة التشغيل</div>
          <div class="playlist-name" id="playlist-name">...</div>
          <div class="playlist-info" id="playlist-info">0 أغنية</div>
        </div>
      </div>
    </div>

    <!-- Actions Bar -->
    <div class="playlist-actions">
      <button class="play-all-btn" onclick="playAll()" title="تشغيل الكل">
        <span class="material-symbols-outlined" style="font-size:28px;font-variation-settings:'FILL' 1">play_arrow</span>
      </button>
      <button class="btn-secondary" style="padding:10px 20px;font-size:13px" onclick="shuffleAll()">
        <span class="material-symbols-outlined" style="font-size:18px">shuffle</span>
        عشوائي
      </button>
      <button class="btn-ghost" style="padding:10px 20px;font-size:13px;margin-right:auto" onclick="toggleAddBar()">
        <span class="material-symbols-outlined" style="font-size:18px">add</span>
        إضافة أغاني
      </button>
    </div>

    <!-- Add music bar -->
    <div class="add-music-bar" id="add-music-bar" style="display:none">
      <input type="text" id="add-search-input" placeholder="ابحث عن أغنية لإضافتها..." autocomplete="off">
      <button class="btn-primary" style="padding:10px 20px;font-size:13px" onclick="searchToAdd()">بحث</button>
    </div>
    <div id="add-results" style="display:none;padding:0 32px;max-height:300px;overflow-y:auto;border-bottom:1px solid var(--outline-variant)"></div>

    <!-- Tracks List -->
    <div class="page-content" id="tracks-container">
      <div class="empty-playlist" id="empty-msg">
        <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">queue_music</span>
        <h3 class="text-headline-sm" style="margin-bottom:8px">قائمتك فارغة</h3>
        <p class="text-body-sm" style="color:var(--outline);margin-bottom:24px">أضف أغاني من خلال البحث أعلاه</p>
        <button class="btn-primary" onclick="toggleAddBar()">
          <span class="material-symbols-outlined">add</span>
          أضف أغاني
        </button>
      </div>
      <div id="playlist-tracks"></div>
    </div>

    <div style="height:40px"></div>
  </div>
</div>

<div id="player-slot"></div>
<div id="mobile-nav-slot"></div>

<script src="../js/player.js"></script>
<script src="../js/layout.js"></script>
<script>
Layout.inject('library');

// ─── Load Playlist ────────────────────────────────────────
const params = new URLSearchParams(location.search);
const playlistId = params.get('id');
let playlist = null;

function loadPlaylist() {
  const state = BatootApp.getState();
  playlist = state.playlists.find(p => p.id === playlistId);
  if (!playlist) {
    document.getElementById('playlist-name').textContent = 'قائمة غير موجودة';
    return;
  }
  document.title = playlist.name + ' — بطوط ميوزك';
  document.getElementById('topbar-title').textContent = playlist.name;
  document.getElementById('playlist-name').textContent = playlist.name;
  document.getElementById('playlist-info').textContent = `${playlist.tracks.length} أغنية`;

  // Cover art
  const cover = document.getElementById('playlist-cover');
  const imgs = playlist.tracks.filter(t => t.image).slice(0, 4);
  if (imgs.length >= 4) {
    cover.innerHTML = `<div class="playlist-cover-grid">${imgs.map(t => `<img src="${t.image}" alt="">`).join('')}</div>`;
  } else if (imgs.length >= 1) {
    cover.innerHTML = `<img src="${imgs[0].image}" style="width:100%;height:100%;object-fit:cover">`;
  }

  renderTracks();
}

function renderTracks() {
  if (!playlist) return;
  const container = document.getElementById('playlist-tracks');
  const empty = document.getElementById('empty-msg');
  if (!playlist.tracks.length) {
    empty.style.display = '';
    container.innerHTML = '';
    return;
  }
  empty.style.display = 'none';
  container.innerHTML = playlist.tracks.map((t, i) => `
    <div class="track-row" onclick="BatootApp.play('${t.id}');BatootApp.cacheTracks(playlist.tracks)">
      <div class="track-row__num">${i + 1}</div>
      <div class="track-row__equalizer">
        <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
      </div>
      <div class="track-row__thumb">
        ${t.image ? `<img src="${t.image}" alt="${t.title}">` : ''}
      </div>
      <div class="track-row__info">
        <div class="track-row__title">${escHtml(t.title)}</div>
        <div class="track-row__artist">${escHtml(t.artist)}</div>
      </div>
      <div class="track-row__duration">${BatootApp.formatTime(t.duration)}</div>
      <div class="track-row__actions">
        <button class="btn-icon" onclick="event.stopPropagation();removeTrack('${t.id}')" style="color:var(--error)" title="إزالة">
          <span class="material-symbols-outlined" style="font-size:18px">remove_circle</span>
        </button>
      </div>
    </div>
  `).join('');
}

// ─── Playback ─────────────────────────────────────────────
function playAll() {
  if (!playlist?.tracks.length) return;
  BatootApp.cacheTracks(playlist.tracks);
  const [first] = playlist.tracks;
  BatootApp.play(first.id);
  // Set queue
  BatootApp.getState().queue = [...playlist.tracks];
  BatootApp.getState().currentIndex = 0;
}

function shuffleAll() {
  if (!playlist?.tracks.length) return;
  BatootApp.cacheTracks(playlist.tracks);
  const shuffled = [...playlist.tracks].sort(() => Math.random() - 0.5);
  BatootApp.getState().queue = shuffled;
  BatootApp.getState().currentIndex = 0;
  BatootApp.play(shuffled[0].id);
}

// ─── Remove Track ─────────────────────────────────────────
function removeTrack(id) {
  if (!playlist) return;
  playlist.tracks = playlist.tracks.filter(t => t.id !== id);
  BatootApp.savePlaylists();
  loadPlaylist();
}

// ─── Delete Playlist ──────────────────────────────────────
function deletePlaylist() {
  if (!confirm('هل تريد حذف هذه القائمة؟')) return;
  const state = BatootApp.getState();
  state.playlists = state.playlists.filter(p => p.id !== playlistId);
  BatootApp.savePlaylists();
  history.back();
}

// ─── Edit Name ───────────────────────────────────────────
function startEdit() {
  if (!playlist) return;
  const newName = prompt('اسم القائمة الجديد:', playlist.name);
  if (!newName?.trim()) return;
  playlist.name = newName.trim();
  BatootApp.savePlaylists();
  loadPlaylist();
}

// ─── Add Songs ────────────────────────────────────────────
let addSearchTimer = null;
function toggleAddBar() {
  const bar = document.getElementById('add-music-bar');
  const vis = bar.style.display === 'none';
  bar.style.display = vis ? '' : 'none';
  if (vis) setTimeout(() => document.getElementById('add-search-input').focus(), 50);
}

document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('add-search-input');
  inp.addEventListener('input', () => {
    clearTimeout(addSearchTimer);
    const q = inp.value.trim();
    if (q) addSearchTimer = setTimeout(() => searchToAdd(q), 400);
    else document.getElementById('add-results').style.display = 'none';
  });
});

async function searchToAdd(q) {
  const input = document.getElementById('add-search-input');
  q = q || input.value.trim();
  if (!q) return;
  const resultBox = document.getElementById('add-results');
  resultBox.style.display = '';
  resultBox.innerHTML = '<div style="padding:16px;color:var(--outline);font-size:13px">جاري البحث...</div>';
  try {
    const tracks = await BatootApp.searchJamendo(q);
    BatootApp.cacheTracks(tracks);
    if (!tracks.length) { resultBox.innerHTML = '<div style="padding:16px;color:var(--outline);font-size:13px">لا نتائج</div>'; return; }
    resultBox.innerHTML = tracks.slice(0, 10).map(t => `
      <div class="track-row" style="cursor:default">
        <div class="track-row__thumb">
          ${t.image ? `<img src="${t.image}" alt="${t.title}">` : ''}
        </div>
        <div class="track-row__info">
          <div class="track-row__title">${escHtml(t.title)}</div>
          <div class="track-row__artist">${escHtml(t.artist)}</div>
        </div>
        <div class="track-row__duration">${BatootApp.formatTime(t.duration)}</div>
        <button class="btn-primary" style="padding:6px 14px;font-size:12px;flex-shrink:0" onclick="addSong('${t.id}')">
          <span class="material-symbols-outlined" style="font-size:16px">add</span>
          إضافة
        </button>
      </div>
    `).join('');
  } catch(e) { resultBox.innerHTML = '<div style="padding:16px;color:var(--error);font-size:13px">خطأ في البحث</div>'; }
}

function addSong(id) {
  if (!playlist) return;
  const t = BatootApp.getTrack(id);
  if (!t) return;
  BatootApp.addToPlaylist(playlistId, t);
  loadPlaylist();
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────
loadPlaylist();
</script>
</body>
</html>
