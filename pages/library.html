<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="مكتبتك الموسيقية — قوائم التشغيل والمفضلات على بطوط ميوزك">
<title>مكتبتي — بطوط ميوزك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/design-system.css">
<link rel="stylesheet" href="../css/app.css">
<style>
  .library-tabs {
    display: flex; gap: 0; border-bottom: 1px solid var(--outline-variant);
    padding: 0 32px; position: sticky; top: 64px; z-index: 40;
    background: rgba(250,248,255,0.9); backdrop-filter: blur(16px);
  }
  .lib-tab {
    padding: 16px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    color: var(--outline); border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .lib-tab.active { color: var(--primary-container); border-color: var(--primary-container); }
  .lib-tab:hover { color: var(--on-surface); }
  .lib-tab .material-symbols-outlined { font-size: 18px; }

  .lib-section { display: none; }
  .lib-section.active { display: block; }

  .playlist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 16px;
  }
  .playlist-card {
    background: rgba(255,255,255,0.6); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.8); border-radius: 16px; padding: 16px;
    cursor: pointer; transition: all 0.3s ease;
  }
  .playlist-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(79,70,229,0.15); }
  .playlist-thumb {
    width: 100%; aspect-ratio: 1; border-radius: 12px; margin-bottom: 12px;
    overflow: hidden; position: relative;
    background: linear-gradient(135deg, var(--primary-fixed), var(--secondary-fixed));
    display: flex; align-items: center; justify-content: center;
  }
  .playlist-thumb-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 2px; width: 100%; height: 100%;
  }
  .playlist-thumb-grid img { width: 100%; height: 100%; object-fit: cover; }

  .create-playlist-card {
    background: rgba(79,70,229,0.06); border: 2px dashed rgba(79,70,229,0.2);
    border-radius: 16px; padding: 16px; cursor: pointer; transition: all 0.3s;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; min-height: 200px;
  }
  .create-playlist-card:hover { background: rgba(79,70,229,0.1); border-color: var(--primary-container); }
  .create-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--primary-container), var(--secondary-container));
    display: flex; align-items: center; justify-content: center; color: white;
    box-shadow: 0 4px 16px rgba(79,70,229,0.3);
  }

  .liked-empty, .history-empty {
    text-align: center; padding: 80px 20px;
  }
  .liked-empty .material-symbols-outlined,
  .history-empty .material-symbols-outlined {
    font-size: 72px; display: block; margin-bottom: 16px;
    opacity: 0.3; color: var(--primary-container);
  }

  @media(max-width:480px) {
    .library-tabs { padding: 0 16px; overflow-x: auto; scrollbar-width: none; }
    .playlist-grid { grid-template-columns: repeat(2,1fr); }
    .page-content { padding: 16px; }
  }
</style>
</head>
<body class="liquid-bg">
<div class="ambient-blobs"></div>

<div class="app-shell">
  <div id="sidebar-slot"></div>

  <div class="main-content">
    <!-- Topbar -->
    <div class="topbar">
      <button class="topbar-nav-btn" onclick="history.back()">
        <span class="material-symbols-outlined" style="font-size:20px">arrow_back</span>
      </button>
      <span class="text-headline-sm" style="font-weight:700">مكتبتي</span>
      <div class="topbar-actions">
        <button class="btn-icon" onclick="Layout.openCreatePlaylist()" title="قائمة جديدة">
          <span class="material-symbols-outlined" style="font-size:22px">add</span>
        </button>
        <div class="topbar-avatar">ب</div>
      </div>
    </div>

    <!-- Library Tabs -->
    <div class="library-tabs">
      <button class="lib-tab active" onclick="switchLibTab(this,'playlists')">
        <span class="material-symbols-outlined">queue_music</span>
        قوائمي
      </button>
      <button class="lib-tab" onclick="switchLibTab(this,'liked')">
        <span class="material-symbols-outlined">favorite</span>
        المفضلة
      </button>
      <button class="lib-tab" onclick="switchLibTab(this,'history')">
        <span class="material-symbols-outlined">history</span>
        السجل
      </button>
    </div>

    <!-- Playlists Section -->
    <div class="lib-section active page-content" id="section-playlists">
      <div class="playlist-grid" id="playlists-grid">
        <!-- Filled by JS -->
      </div>
    </div>

    <!-- Liked Section -->
    <div class="lib-section page-content" id="section-liked">
      <div id="liked-container">
        <div class="liked-empty" id="liked-empty">
          <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">favorite</span>
          <h3 class="text-headline-sm" style="margin-bottom:8px">لا توجد أغاني مفضلة</h3>
          <p class="text-body-sm" style="color:var(--outline)">اضغط على قلب أي أغنية لإضافتها هنا</p>
          <a href="home.html" class="btn-primary" style="margin-top:24px;display:inline-flex">اكتشف أغاني</a>
        </div>
        <div id="liked-tracks" class="track-results"></div>
      </div>
    </div>

    <!-- History Section -->
    <div class="lib-section page-content" id="section-history">
      <div id="history-empty" class="history-empty" style="display:none">
        <span class="material-symbols-outlined">history</span>
        <h3 class="text-headline-sm" style="margin-bottom:8px">لا يوجد سجل بعد</h3>
        <p class="text-body-sm" style="color:var(--outline)">الأغاني التي شغلتها ستظهر هنا</p>
      </div>
      <div id="history-tracks" class="track-results"></div>
    </div>

    <div style="height:40px"></div>
  </div>
</div>

<div id="player-slot"></div>
<div id="mobile-nav-slot"></div>

<script src="../js/player.js"></script>
<script src="../js/layout.js"></script>
<script>
Layout.inject('library');

function switchLibTab(btn, section) {
  document.querySelectorAll('.lib-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.lib-section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + section).classList.add('active');
  if (section === 'liked') renderLiked();
  if (section === 'history') renderHistory();
}

// ─── Playlists ──────────────────────────────────────────
function renderPlaylists() {
  const state = BatootApp.getState();
  const grid = document.getElementById('playlists-grid');
  const playlists = state.playlists;

  let html = `
    <div class="create-playlist-card" onclick="Layout.openCreatePlaylist()">
      <div class="create-icon">
        <span class="material-symbols-outlined" style="font-size:26px">add</span>
      </div>
      <div style="font-size:14px;font-weight:700;color:var(--primary-container)">قائمة جديدة</div>
      <div style="font-size:12px;color:var(--outline)">أنشئ قائمة التشغيل</div>
    </div>
  `;

  html += playlists.map(pl => {
    const imgs = pl.tracks.filter(t => t.image).slice(0, 4);
    const thumbHtml = imgs.length >= 4
      ? `<div class="playlist-thumb-grid">${imgs.map(t => `<img src="${t.image}" alt="">`).join('')}</div>`
      : imgs.length === 1
        ? `<img src="${imgs[0].image}" style="width:100%;height:100%;object-fit:cover">`
        : `<span class="material-symbols-outlined" style="font-size:40px;color:var(--primary-container);font-variation-settings:'FILL' 1">queue_music</span>`;
    return `
      <div class="playlist-card" onclick="openPlaylist('${pl.id}')">
        <div class="playlist-thumb">${thumbHtml}</div>
        <div style="font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${pl.name}</div>
        <div style="font-size:12px;color:var(--outline)">${pl.tracks.length} أغنية</div>
      </div>
    `;
  }).join('');

  grid.innerHTML = html;
}

function openPlaylist(id) {
  window.location.href = `playlist.html?id=${id}`;
}

// ─── Liked ──────────────────────────────────────────────
function renderLiked() {
  const state = BatootApp.getState();
  const liked = [...state.liked];
  const tracks = liked.map(id => BatootApp.getTrack(id)).filter(Boolean);
  const empty = document.getElementById('liked-empty');
  const container = document.getElementById('liked-tracks');
  if (!tracks.length) {
    empty.style.display = '';
    container.innerHTML = '';
  } else {
    empty.style.display = 'none';
    container.innerHTML = BatootApp.renderTrackRows(tracks);
  }
}

// ─── History ─────────────────────────────────────────────
function renderHistory() {
  const state = BatootApp.getState();
  const history = state.history;
  const empty = document.getElementById('history-empty');
  const container = document.getElementById('history-tracks');
  if (!history.length) {
    empty.style.display = '';
    container.innerHTML = '';
  } else {
    empty.style.display = 'none';
    container.innerHTML = BatootApp.renderTrackRows(history, false);
  }
}

// ─── Init ─────────────────────────────────────────────────
renderPlaylists();

// Re-render playlists when modal closes
const obs = new MutationObserver(() => renderPlaylists());
setTimeout(() => {
  const m = document.getElementById('create-playlist-modal');
  if (m) obs.observe(m, { attributes: true, attributeFilter: ['class'] });
}, 500);
</script>
</body>
</html>
